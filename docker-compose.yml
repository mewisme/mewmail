services:
  api:
    build: ./api
    image: ghcr.io/mewisme/mewmail/api:latest
    container_name: mewmail-api
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    networks:
      - mewmail
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  postfix:
    build: ./postfix
    image: ghcr.io/mewisme/mewmail/postfix:latest
    container_name: mewmail-postfix
    env_file: .env
    environment:
      DOMAIN: ${DOMAIN}
      PORT: ${PORT:-8080}
    volumes:
      - ./data:/data:ro
    ports:
      - "25:25"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mewmail
    restart: unless-stopped

networks:
  mewmail:
